interface:
  display_name: "Using Git Worktrees"
  short_description: "隔离工作区：原生 worktree 工具优先，git worktree 降级，含依赖安装与测试基线验证。仅在开始需要与当前工作区隔离的开发、或执行实施计划前使用；日常小改动无需隔离"
  default_prompt: "Use $using-git-worktrees to set up an isolated workspace before implementation."

policy:
  allow_implicit_invocation: true
